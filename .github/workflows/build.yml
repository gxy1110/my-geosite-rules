name: Build Custom GeoSite

# 触发条件：每天定时执行 + 支持手动点击执行
on:
  schedule:
    # 每天北京时间早上 6:00 执行 (UTC 时间 22:00)
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21' # 安装 Go 环境

    - name: Clone domain-list-community
      run: |
        git clone https://github.com/v2fly/domain-list-community.git
        cd domain-list-community

    - name: Generate my-ads rules
      run: |
        cd domain-list-community/data
        # 执行终极合并与清洗命令，生成 my-ads
        curl -sL "https://raw.githubusercontent.com/lingeringsound/10007/main/all" "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-hosts.txt" | grep -E '^(0\.0\.0\.0|127\.0\.0\.1)' | sed 's/#.*//' | awk '{print $2}' | grep -v 'localhost' | grep -vE '^([0-9]{1,3}\.){3}[0-9]{1,3}$|:' | sort -u > my-ads
        echo "成功提取并生成 $(wc -l < my-ads) 条去广告规则！"

    - name: Generate my-webrtc rules
      run: |
        cd domain-list-community/data
        # 添加 STUN 拦截规则，防 WebRTC 泄露真实 IP
        # 注意：这里使用单引号，防止 Bash 吃掉正则表达式里的反斜杠
        # echo 'regexp:^stun\..*' > my-webrtc
        # 顺手把常见的关键字也加上，双重保险
        echo 'keyword:stun' >> my-webrtc
        echo "成功生成 my-webrtc 防护规则！"

    - name: Build geosite.dat
      run: |
        cd domain-list-community
        # 编译生成 dlc.dat
        go run main.go
        # 将编译好的文件重命名并移到根目录
        mv dlc.dat ../chenchen.dat

    - name: Get current date
      id: date
      run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Create Release and Upload
      uses: softprops/action-gh-release@v2
      with:
        # 1. 使用固定标签名，这样下载链接永远不变
        tag_name: latest
        # 2. 标题可以保留日期，方便你在网页端查看更新时间
        name: "最新自动编译版 (更新于 ${{ env.DATE }})"
        body: "🤖 由 GitHub Actions 每天自动抓取、合并、清洗并编译。包含去广告及 WebRTC 防泄漏规则。"
        # 3. 核心设置：如果 latest 标签已存在，则更新它而不是报错
        overwrite: true
        # 4. 确保将其标记为最新的 Release
        make_latest: true
        files: chenchen.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
